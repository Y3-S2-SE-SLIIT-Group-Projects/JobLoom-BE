# Docker Compose for Development Environment
# Using MongoDB Atlas Cloud - No local MongoDB needed
version: '3.9'

services:
  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: jobloom-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # MongoDB Atlas connection string from .env file
      MONGODB_URI: ${MONGODB_URI}
      LOG_LEVEL: debug
      # Calendly OAuth (must be explicitly passed - .env is not copied into Docker image)
      CALENDLY_CLIENT_ID: ${CALENDLY_CLIENT_ID}
      CALENDLY_CLIENT_SECRET: ${CALENDLY_CLIENT_SECRET}
      CALENDLY_REDIRECT_URI: ${CALENDLY_REDIRECT_URI:-http://localhost:5173/auth/calendly/callback}
      CALENDLY_WEBHOOK_SIGNING_KEY: ${CALENDLY_WEBHOOK_SIGNING_KEY}
    env_file:
      - .env
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      # Named volume for node_modules
      - node_modules:/app/node_modules
      # Logs directory
      - ./logs:/app/logs
    networks:
      - jobloom-network
    command: npm run dev

  # Redis (for caching - optional but industry standard)
  redis:
    image: redis:7-alpine
    container_name: jobloom-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    networks:
      - jobloom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander (Redis UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: jobloom-redis-commander-dev
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - jobloom-network

networks:
  jobloom-network:
    driver: bridge
    name: jobloom-dev-network

volumes:
  redis_data_dev:
    name: jobloom-redis-data-dev
  node_modules:
    name: jobloom-node-modules-dev
