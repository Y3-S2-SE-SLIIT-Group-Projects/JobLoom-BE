version: '3.8'

services:
  mongo-test:
    image: mongo:7
    container_name: jobloom-mongo-test
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: jobloom-test
    tmpfs:
      - /data/db # Store data in memory for faster tests
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
